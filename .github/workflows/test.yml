name: Tests

on:
  push:
    branches: ["main", "master", "v0.6.0"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,pdf,ocr]"

      - name: Lint with ruff
        run: ruff check dcm_anon/ tests/ spaces/

      - name: Type check with mypy
        run: mypy --strict dcm_anon/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=dcm_anon \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  import-contract:
    name: "Core import without optional extras"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install core only (no [pdf] / [ocr])
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Core modules import with pydicom only
        run: |
          python -c "import dcm_anon; import dcm_anon.cli; import dcm_anon.pipeline; import dcm_anon.verify_output; print('core import OK', dcm_anon.__version__)"
